<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Cloud Cost Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-shell auth-shell">
    <section class="panel auth-panel">
      <p class="eyebrow">Secure Access</p>
      <h1>Sign in to Cloud Cost Intelligence</h1>
      <p class="status-copy">Use an admin, operator, or viewer account to access the dashboard and APIs.</p>
      <form id="loginForm" class="auth-form">
        <label class="field">
          <span>Email</span>
          <input id="email" type="email" required autocomplete="username">
        </label>
        <label class="field">
          <span>Password</span>
          <input id="password" type="password" required autocomplete="current-password">
        </label>
        <button class="button button-primary" type="submit">Sign In</button>
      </form>
      <div id="loginStatus" class="auth-status">Enter your credentials to continue.</div>
    </section>
  </div>
  <script src="/static/login.js"></script>
</body>
</html>
